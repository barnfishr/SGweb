<!-- Styled franchise form wired to JotForm 261820910333045.
     PARKED until JotForm field names are verified (FIXME_JF_* placeholders).
     Swap into franchise.html in place of the iframe embed, then delete this file. -->
<form class="inquiry-form" data-animate="fade-up" data-delay="300"
                action="https://submit.jotform.com/submit/261820910333045/" method="POST"
                aria-label="Franchise inquiry form">
            <input type="hidden" name="formID" value="261820910333045">
            <input type="hidden" name="website" value="">

            <div class="inquiry-form__field">
              <label class="inquiry-form__label" for="franchise-first">First Name</label>
              <input class="inquiry-form__input" type="text" id="franchise-first" name="FIXME_JF_FIRST" placeholder="Your first name" required autocomplete="given-name">
            </div>

            <div class="inquiry-form__field">
              <label class="inquiry-form__label" for="franchise-last">Last Name</label>
              <input class="inquiry-form__input" type="text" id="franchise-last" name="FIXME_JF_LAST" placeholder="Your last name" required autocomplete="family-name">
            </div>

            <div class="inquiry-form__field">
              <label class="inquiry-form__label" for="franchise-email">Email</label>
              <input class="inquiry-form__input" type="email" id="franchise-email" name="FIXME_JF_EMAIL" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="inquiry-form__field">
              <label class="inquiry-form__label" for="franchise-phone">Phone</label>
              <input class="inquiry-form__input" type="tel" id="franchise-phone" name="FIXME_JF_PHONE" placeholder="(555) 123-4567" required autocomplete="tel">
            </div>

            <div class="inquiry-form__field">
              <label class="inquiry-form__label" for="franchise-location">Preferred Market / City</label>
              <input class="inquiry-form__input" type="text" id="franchise-location" name="FIXME_JF_MARKET" placeholder="e.g. Provo, UT" required>
            </div>

            <div class="inquiry-form__field">
              <label class="inquiry-form__label" for="franchise-capital">Total Capital Available</label>
              <select class="inquiry-form__select" id="franchise-capital" name="FIXME_JF_TOTALCAP" required>
                <option value="" disabled selected>Select range</option>
                <option>Under $100,000</option>
                <option>$100,000 &#8211; $250,000</option>
                <option>$250,000 &#8211; $500,000</option>
                <option>$500,000+</option>
              </select>
            </div>

            <div class="inquiry-form__field">
              <label class="inquiry-form__label" for="franchise-liquid">Liquid Capital Available</label>
              <select class="inquiry-form__select" id="franchise-liquid" name="FIXME_JF_LIQUIDCAP" required>
                <option value="" disabled selected>Select range</option>
                <option>Under $50,000</option>
                <option>$50,000 &#8211; $100,000</option>
                <option>$100,000 &#8211; $250,000</option>
                <option>$250,000+</option>
              </select>
            </div>

            <div class="inquiry-form__field inquiry-form__field--full inquiry-form__field--fee">
              <span class="inquiry-form__label">Franchise Fee Acknowledgment <span style="color:var(--color-banana-split);">*</span></span>
              <p class="inquiry-form__fee-desc">
                Snelgrove franchises carry a $50,000 franchise fee. Please confirm you understand
                this before submitting your inquiry.
              </p>
              <div class="inquiry-form__radio-row" role="radiogroup">
                <label class="inquiry-form__radio">
                  <input type="radio" name="FIXME_JF_FEEACK" value="Yes &#8212; I understand" required>
                  <span>Yes &mdash; I understand</span>
                </label>
                <label class="inquiry-form__radio">
                  <input type="radio" name="FIXME_JF_FEEACK" value="No">
                  <span>No</span>
                </label>
              </div>
            </div>

            <div class="inquiry-form__field inquiry-form__field--full">
              <label class="inquiry-form__label" for="franchise-message">Tell Us About Yourself</label>
              <textarea class="inquiry-form__textarea" id="franchise-message" name="FIXME_JF_ABOUT" placeholder="Share your background, experience, and what excites you about Snelgrove..." rows="4"></textarea>
            </div>

            <div class="inquiry-form__submit">
              <button type="submit" class="btn btn--gold" style="width:100%; justify-content:center; font-size:var(--text-base); padding:var(--space-4) var(--space-8);">
                Submit Inquiry
              </button>
            </div>
          </form>
